[pytest]
pythonpath = .
testpaths = tests
python_files = test_*.py
addopts =
    -v
    --strict-markers
    --tb=short
    --alluredir=allure-results
markers =
    smoke: быстрые smoke mobile-тесты
    lambdatest_smoke: два быстрых smoke-теста для облака (LambdaTest / BrowserStack)
    mobile: mobile UI-тесты Trello
    no_home_reset: не вызывать go_home перед тестом
    context(name): допустимые режимы local и/или lambdatest (skip при несовпадении)
    local_only: только локальный эмулятор
    lambdatest_only: только LambdaTest
    local: локальный прогон (эмулятор / без облака)
    browserstack: облако (BrowserStack / LambdaTest); исключить -m "not browserstack"
