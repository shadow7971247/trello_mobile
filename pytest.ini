[pytest]
pythonpath = .
testpaths = tests
python_files = test_*.py
addopts =
    -v
    --strict-markers
    --tb=short
    --alluredir=allure-results
markers =
    smoke: быстрые smoke mobile-тесты
    cloud_smoke: BrowserStack CI без логина (запуск APK, welcome, package)
    mobile: mobile UI-тесты Trello
    no_home_reset: не вызывать go_home перед тестом
    context(name): допустимые режимы local и/или browserstack (skip при несовпадении)
    local_only: только локальный эмулятор
    browserstack_only: только BrowserStack
    local: локальный прогон (эмулятор)
    browserstack: облако BrowserStack; исключить -m "not browserstack"
